<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Word - İndir</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #121212; color: white; text-align: center; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div>
        <h1>Magic Word'e Yönlendiriliyorsunuz...</h1>
        <div class="loader"></div>
        <p>Eğer yönlendirme gerçekleşmezse <a id="manual-link" style="color: #3498db;" href="#">buraya tıklayın</a>.</p>
    </div>

    <script>
        // Linklerini buraya yapıştır
        const iosLink = "https://apps.apple.com/us/app/magic-word/id6756522605"; 
        const androidLink = "https://play.google.com/store/apps/details?id=com.SnowdropGames.MagicWord";
        const desktopFallback = "https://snowdropstudio.store/"; // Masaüstü için ana sayfan

        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        let finalLink = desktopFallback;

        // iOS tespiti
        if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
            finalLink = iosLink;
        } 
        // Android tespiti
        else if (/android/i.test(userAgent)) {
            finalLink = androidLink;
        }

        // Manuel linki güncelle
        document.getElementById('manual-link').href = finalLink;

        // Otomatik yönlendirme
        window.location.href = finalLink;
    </script>
</body>
</html>
